<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EL Signals">
<meta name="theme-color" content="#0a0c0f">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Elizabeth Line Signal Reference</title>
<style>
:root{
  --bg:#0a0c0f;--panel:#111418;--panel2:#13181f;
  --border:#1e2530;--bb:#2a3545;
  --text:#c8d4e0;--dim:#4a5a6a;--bright:#e8f0f8;
  --acc:#0088cc;--acc2:#00ccaa;--pur:#9B4F96;
  --mono:'Courier New',Courier,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:var(--bg)}
body{color:var(--text);font-family:var(--sans);font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden;height:100dvh}

/* HEADER */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--panel);border-bottom:2px solid var(--pur);padding-top:var(--sat)}
.hdr-inner{height:50px;display:flex;align-items:center;gap:10px;padding:0 14px}
.logo{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.logo-bar{width:26px;height:5px;background:var(--pur);border-radius:3px}
.logo-dot{width:9px;height:9px;background:#00aa55;border-radius:50%;margin-left:17px;margin-top:-2px}
.hdr-t{flex:1;min-width:0}
.hdr-t h1{font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--bright);line-height:1}
.hdr-t p{font-family:var(--mono);font-size:9px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* SEARCH PANEL — two child divs: .srch-row and .chip-row */
.srch{position:fixed;left:0;right:0;z-index:190;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 14px 10px;display:flex;flex-direction:column;gap:8px}
.srch-row{position:relative}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none;font-size:15px}
input[type=search]{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--bb);color:var(--bright);font-family:var(--mono);font-size:14px;padding:10px 10px 10px 36px;border-radius:10px;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s;display:block}
input[type=search]:focus{border-color:var(--acc);background:rgba(0,136,204,.07)}
input[type=search]::placeholder{color:var(--dim)}
input[type=search]::-webkit-search-cancel-button{-webkit-appearance:none}
.chip-row{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:transparent;border:1px solid var(--bb);color:var(--dim);font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;outline:none;-webkit-appearance:none;transition:all .15s}
.chip:active{transform:scale(.95)}
.c-s1.on{background:#1a0f2e;border-color:#9B4F96;color:#cc88ff}
.c-s3.on{background:#0a2535;border-color:#0a4560;color:#44bbee}
.c-s4.on{background:#0a3520;border-color:#0a5030;color:#44ee88}
.c-dn.on{background:#0a2535;border-color:#0a4560;color:#44bbee}
.c-up.on{background:#0a3520;border-color:#0a5030;color:#44ee88}
.c-mn.on{background:#0f2a0f;border-color:#1a5a1a;color:#55ee55}
.c-pl.on{background:#2a1800;border-color:#5a3000;color:#ffaa22}
.c-lc.on{background:#15202f;border-color:var(--acc);color:var(--acc)}

/* SCROLL */
.scroll{position:fixed;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:var(--sab)}

/* STATS */
.stats{background:#0c0f13;border-bottom:1px solid var(--border);padding:5px 14px;display:flex;gap:16px;font-family:var(--mono);font-size:10px;color:var(--dim);position:sticky;top:0;z-index:10}
.stats span{color:var(--acc2);font-weight:bold}

/* SECTION DIVIDER */
.sdiv{background:#0c0f13;border-bottom:2px solid var(--pur);padding:7px 14px;display:flex;align-items:center;gap:10px}
.sdiv-badge{font-family:var(--mono);font-size:10px;font-weight:bold;padding:3px 10px;border-radius:12px;flex-shrink:0}
.sdiv-badge.s1{background:#1a0f2e;color:#cc88ff;border:1px solid #9B4F96}
.sdiv-badge.s3{background:#0a2535;color:#44bbee;border:1px solid #0a4560}
.sdiv-badge.s4{background:#0a3520;color:#44ee88;border:1px solid #0a5030}
.sdiv-name{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}

/* LOCATION */
.lb{border-bottom:1px solid var(--border)}
.lh{background:var(--panel2);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;-webkit-user-select:none;border-bottom:1px solid var(--border)}
.lh:active{background:#1a2535}
.lchev{font-size:9px;color:var(--dim);transition:transform .25s;flex-shrink:0;width:14px;text-align:center}
.lb.col .lchev{transform:rotate(-90deg)}
.ln{font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--bright);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lm{font-family:var(--mono);font-size:10px;color:var(--acc);white-space:nowrap;flex-shrink:0}
.lct{font-family:var(--mono);font-size:10px;color:var(--dim);white-space:nowrap;flex-shrink:0;background:rgba(255,255,255,.04);padding:2px 6px;border-radius:8px}
.lbody{display:block}
.lb.col .lbody{display:none}

/* SIGNAL */
.sg{border-bottom:1px solid rgba(30,37,48,.8)}
.sgh{background:#0d1015;padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sid{font-family:var(--mono);font-size:14px;font-weight:bold;color:var(--bright);flex-shrink:0}
.dirtag{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:10px;text-transform:uppercase;flex-shrink:0}
.dirtag.dn{background:#0a2535;color:#44bbee;border:1px solid #0a4560}
.dirtag.up{background:#0a3520;color:#44ee88;border:1px solid #0a5030}

/* ROUTE ROW */
.rr{padding:8px 14px;border-bottom:1px solid #141a22;display:grid;grid-template-columns:1fr auto;gap:3px 10px;align-items:start}
.rr:last-child{border-bottom:none}
.rr:active{background:#12181f}
.rl{font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.4;grid-column:1;grid-row:1}
.rd{font-family:var(--mono);font-size:11px;color:var(--acc);grid-column:1;grid-row:2}
.rd::before{content:"-> ";color:var(--dim)}
.rright{grid-column:2;grid-row:1/3;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.asp{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:5px;flex-shrink:0}
.asp.m{background:#0f2a0f;color:#55ee55;border:1px solid #1a5a1a}
.asp.p{background:#2a1800;color:#ffaa22;border:1px solid #5a3000}
.ind{font-family:var(--mono);font-size:11px;text-align:right;white-space:nowrap}
.i0{color:var(--dim)}.i1{color:#88bbff}.i2{color:#ffdd44;font-weight:bold}.i3{color:#ff8844}.i4{color:var(--text)}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--dim);font-family:var(--mono)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

/* BOTTOM SHEET */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);display:none;align-items:flex-end;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.sheet{width:100%;background:var(--panel);border-radius:20px 20px 0 0;border-top:2px solid var(--pur);max-height:75dvh;display:flex;flex-direction:column;padding-bottom:var(--sab)}
.sheet-handle{width:40px;height:4px;background:var(--bb);border-radius:2px;margin:12px auto 0}
.sheet-title{font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.07em;color:var(--bright);padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sheet-close{font-size:22px;color:var(--dim);cursor:pointer;line-height:1}
.sheet-list{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
.sheet-item{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.sheet-item:active{background:var(--panel2)}
.sheet-item.sel .item-name{color:var(--acc)}
.item-name{font-size:15px;color:var(--bright);font-weight:500}
.item-sub{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px}
.item-check{color:var(--acc);font-size:18px}
.sec-hdr{padding:8px 16px 4px;font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;background:var(--bg);border-bottom:1px solid var(--border)}
mark{background:rgba(0,136,204,.25);color:var(--bright);border-radius:2px;padding:0 2px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bb);border-radius:2px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div class="logo"><div class="logo-bar"></div><div class="logo-dot"></div></div>
    <div class="hdr-t">
      <h1>Elizabeth Line &middot; Signals</h1>
      <p>S1 Paddington&ndash;Reading &middot; S3 Liverpool St&ndash;Shenfield &middot; S4 Heathrow</p>
    </div>
  </div>
</div>

<div class="srch" id="srch">
  <div class="srch-row">
    <span class="srch-ico">&#9906;</span>
    <input type="search" id="searchbox"
           placeholder="Search signal ID, route, destination..."
           autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="chip-row">
    <button class="chip c-s1" id="c-s1">S1</button>
    <button class="chip c-s3" id="c-s3">S3</button>
    <button class="chip c-s4" id="c-s4">S4</button>
    <button class="chip c-dn" id="c-dn">&#8595; Down</button>
    <button class="chip c-up" id="c-up">&#8593; Up</button>
    <button class="chip c-mn" id="c-mn">Main</button>
    <button class="chip c-pl" id="c-pl">PL</button>
    <button class="chip c-lc" id="c-lc">&#128205; Location</button>
  </div>
</div>

<div class="scroll" id="scroll">
  <div class="stats">
    Signals:&nbsp;<span id="ss">-</span>&ensp;
    Routes:&nbsp;<span id="sr">-</span>&ensp;
    Locations:&nbsp;<span id="sl">-</span>
  </div>
  <div id="content"></div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">
      <span>Select Location</span>
      <span class="sheet-close" id="sheet-close">&#10005;</span>
    </div>
    <div class="sheet-list" id="sheet-list"></div>
  </div>
</div>

i:"-----"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN283",d:"DN",r:"Up Relief",t:"SN289",a:"M",i:"Position 4"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN283",d:"DN",r:"Bay Buffer stop",t:"—",a:"M",i:"B (SI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN283",d:"DN",r:"Bay Buffer stop",t:"—",a:"PL",i:"B (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN6195",d:"DN",r:"Up Relief",t:"SN289",a:"PL",i:"-----"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN6195",d:"DN",r:"Platform 5 Bay Stop block",t:"—",a:"PL",i:"-----"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN6195",d:"DN",r:"Siding Stop block",t:"—",a:"PL",i:"-----"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN278",d:"UP",r:"Up Main",t:"SN270",a:"M",i:"Position 1"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN278",d:"UP",r:"Down Main Reversible",t:"SN268",a:"M",i:"-----"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN280",d:"UP",r:"Up Main",t:"SN270",a:"M",i:"-----"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN282",d:"UP",r:"Sidings Stop block",t:"—",a:"PL",i:"S (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN282",d:"UP",r:"Up Goods Loop",t:"SN272",a:"M",i:"G (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN282",d:"UP",r:"Up Goods Loop",t:"SN6194",a:"PL",i:"G (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN282",d:"UP",r:"Up Relief",t:"SN276",a:"M",i:"UR (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN284",d:"UP",r:"Sidings Stop block",t:"—",a:"PL",i:"S (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN284",d:"UP",r:"Up Goods Loop",t:"SN272",a:"M",i:"Position 1"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN284",d:"UP",r:"Up Goods Loop",t:"SN6194",a:"PL",i:"G (MI)"},{x:"S4",l:"Hayes & Harlington",m:"10m 71c",s:"SN284",d:"UP",r:"Up Relief",t:"SN276",a:"M",i:"-----"}];

var SL = {
  S1: 'Section 1 - Paddington to Reading',
  S3: 'Section 3 - Liverpool St to Shenfield',
  S4: 'Section 4 - Hayes & Harlington to Heathrow'
};
var SO = ['S1','S3','S4'];
var fSec = {};
var fDir = '';
var fAsp = '';
var fLoc = '';
var q = '';
var col = {};

function fit() {
  var hh = document.querySelector('.hdr').offsetHeight;
  var sh = document.getElementById('srch').offsetHeight;
  document.getElementById('scroll').style.top = (hh + sh) + 'px';
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hl(txt, term) {
  if (!term) return escH(txt);
  var safe = escH(txt);
  var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function indClass(i) {
  if (!i || i === '-----') return 'i0';
  if (/^Position/i.test(i)) return 'i1';
  if (i.indexOf('(SI)') >= 0) return 'i2';
  if (i.indexOf('(MI)') >= 0) return 'i3';
  return 'i4';
}

function filterData() {
  var out = [];
  for (var k = 0; k < D.length; k++) {
    var r = D[k];
    if (Object.keys(fSec).length > 0 && !fSec[r.x]) continue;
    if (fDir && r.d !== fDir) continue;
    if (fAsp === 'M' && r.a !== 'M') continue;
    if (fAsp === 'PL' && r.a !== 'PL') continue;
    if (fLoc && r.l !== fLoc) continue;
    if (q) {
      var hay = (r.x + ' ' + r.l + ' ' + r.s + ' ' + r.r + ' ' + r.t + ' ' + r.i).toLowerCase();
      if (hay.indexOf(q) < 0) continue;
    }
    out.push(r);
  }
  return out;
}

function render() {
  var data = filterData();

  // count unique signals
  var sigSet = {};
  for (var k = 0; k < data.length; k++) sigSet[data[k].x + data[k].s] = 1;
  document.getElementById('ss').textContent = Object.keys(sigSet).length;
  document.getElementById('sr').textContent = data.length;

  // build tree: sec -> loc -> sig -> [routes]
  var tree = {S1:{}, S3:{}, S4:{}};
  for (var k = 0; k < data.length; k++) {
    var r = data[k];
    if (!tree[r.x][r.l]) tree[r.x][r.l] = {};
    if (!tree[r.x][r.l][r.s]) tree[r.x][r.l][r.s] = [];
    tree[r.x][r.l][r.s].push(r);
  }

  var ct = document.getElementById('content');
  if (!data.length) {
    ct.innerHTML = '<div class="empty"><div class="empty-icon">&#8856;</div><p>No signals match</p></div>';
    document.getElementById('sl').textContent = 0;
    return;
  }

  var lc = 0;
  var html = '';
  for (var si = 0; si < SO.length; si++) {
    var sec = SO[si];
    var locs = tree[sec];
    var locKeys = Object.keys(locs);
    if (!locKeys.length) continue;
    lc += locKeys.length;
    var cls = sec.toLowerCase();
    html += '<div class="sdiv"><span class="sdiv-badge ' + cls + '">' + sec + '</span><span class="sdiv-name">' + SL[sec] + '</span></div>';

    for (var li = 0; li < locKeys.length; li++) {
      var loc = locKeys[li];
      var sigs = locs[loc];
      var sigKeys = Object.keys(sigs);
      var rc = 0;
      for (var i = 0; i < sigKeys.length; i++) rc += sigs[sigKeys[i]].length;
      var mile = sigs[sigKeys[0]][0].m;
      var ck = sec + '|' + loc;
      var isCol = !!col[ck];

      var body = '';
      for (var xi = 0; xi < sigKeys.length; xi++) {
        var sig = sigKeys[xi];
        var routes = sigs[sig];
        var dir = routes[0].d;
        var db = dir === 'DN'
          ? '<span class="dirtag dn">&#8595; DN</span>'
          : '<span class="dirtag up">&#8593; UP</span>';
        var rh = '';
        for (var ri = 0; ri < routes.length; ri++) {
          var ro = routes[ri];
          var ab = ro.a === 'M' ? '<span class="asp m">Main</span>' : '<span class="asp p">PL</span>';
          rh += '<div class="rr">'
              + '<div class="rl">' + hl(ro.r, q) + '</div>'
              + '<div class="rd">' + hl(ro.t, q) + '</div>'
              + '<div class="rright">' + ab + '<span class="ind ' + indClass(ro.i) + '">' + hl(ro.i, q) + '</span></div>'
              + '</div>';
        }
        body += '<div class="sg"><div class="sgh"><span class="sid">' + hl(sig, q) + '</span>' + db + '</div>' + rh + '</div>';
      }

      html += '<div class="lb' + (isCol ? ' col' : '') + '" data-key="' + escH(ck) + '">'
            + '<div class="lh"><span class="lchev">&#9660;</span><span class="ln">' + hl(loc, q) + '</span><span class="lm">' + mile + '</span><span class="lct">' + rc + '</span></div>'
            + '<div class="lbody">' + body + '</div>'
            + '</div>';
    }
  }

  document.getElementById('sl').textContent = lc;
  ct.innerHTML = html;

  var heads = ct.querySelectorAll('.lh');
  for (var h = 0; h < heads.length; h++) {
    heads[h].addEventListener('click', (function(lh) {
      return function() {
        var b = lh.closest('.lb');
        var k = b.getAttribute('data-key');
        b.classList.toggle('col');
        if (col[k]) { delete col[k]; } else { col[k] = 1; }
      };
    })(heads[h]));
  }
}

function updateChips() {
  document.getElementById('c-s1').classList.toggle('on', !!fSec['S1']);
  document.getElementById('c-s3').classList.toggle('on', !!fSec['S3']);
  document.getElementById('c-s4').classList.toggle('on', !!fSec['S4']);
  document.getElementById('c-dn').classList.toggle('on', fDir === 'DN');
  document.getElementById('c-up').classList.toggle('on', fDir === 'UP');
  document.getElementById('c-mn').classList.toggle('on', fAsp === 'M');
  document.getElementById('c-pl').classList.toggle('on', fAsp === 'PL');
  document.getElementById('c-lc').classList.toggle('on', !!fLoc);
}

function toggleSec(s) {
  if (fSec[s]) { delete fSec[s]; } else { fSec[s] = 1; }
  fLoc = '';
  document.getElementById('c-lc').textContent = '&#128205; Location';
  updateChips();
  render();
}

document.getElementById('c-s1').onclick = function() { toggleSec('S1'); };
document.getElementById('c-s3').onclick = function() { toggleSec('S3'); };
document.getElementById('c-s4').onclick = function() { toggleSec('S4'); };
document.getElementById('c-dn').onclick  = function() { fDir = fDir === 'DN' ? '' : 'DN'; updateChips(); render(); };
document.getElementById('c-up').onclick  = function() { fDir = fDir === 'UP' ? '' : 'UP'; updateChips(); render(); };
document.getElementById('c-mn').onclick  = function() { fAsp = fAsp === 'M'  ? '' : 'M';  updateChips(); render(); };
document.getElementById('c-pl').onclick  = function() { fAsp = fAsp === 'PL' ? '' : 'PL'; updateChips(); render(); };
document.getElementById('c-lc').onclick  = function() { openSheet(); };

// SEARCH — uses id="searchbox" to avoid any browser interference
var sb = document.getElementById('searchbox');
sb.addEventListener('input', function() {
  q = sb.value.trim().toLowerCase();
  render();
});
sb.addEventListener('keyup', function() {
  q = sb.value.trim().toLowerCase();
  render();
});

function openSheet() {
  var activeSecs = Object.keys(fSec).length > 0 ? Object.keys(fSec) : SO;
  var list = document.getElementById('sheet-list');
  var html = '<div class="sheet-item' + (fLoc ? '' : ' sel') + '" data-loc="" data-sec="">'
           + '<div><div class="item-name">All Locations</div></div>'
           + (fLoc ? '' : '<span class="item-check">&#10003;</span>')
           + '</div>';
  for (var si = 0; si < activeSecs.length; si++) {
    var sec = activeSecs[si];
    var seen = {};
    var locs = [];
    for (var k = 0; k < D.length; k++) {
      if (D[k].x === sec && !seen[D[k].l]) { seen[D[k].l] = 1; locs.push(D[k].l); }
    }
    if (!locs.length) continue;
    html += '<div class="sec-hdr">' + sec + ' &middot; ' + SL[sec] + '</div>';
    for (var li = 0; li < locs.length; li++) {
      var loc = locs[li];
      var mile = '';
      for (var k = 0; k < D.length; k++) { if (D[k].x === sec && D[k].l === loc) { mile = D[k].m; break; } }
      var sel = fLoc === loc;
      html += '<div class="sheet-item' + (sel ? ' sel' : '') + '" data-loc="' + escH(loc) + '" data-sec="' + sec + '">'
            + '<div><div class="item-name">' + escH(loc) + '</div><div class="item-sub">' + mile + '</div></div>'
            + (sel ? '<span class="item-check">&#10003;</span>' : '')
            + '</div>';
    }
  }
  list.innerHTML = html;
  var items = list.querySelectorAll('.sheet-item');
  for (var i = 0; i < items.length; i++) {
    items[i].addEventListener('click', (function(item) {
      return function() {
        fLoc = item.getAttribute('data-loc');
        var sec = item.getAttribute('data-sec');
        if (fLoc && sec) { fSec = {}; fSec[sec] = 1; }
        if (!fLoc) fSec = {};
        var lbl = fLoc ? fLoc.substring(0, 18) : '&#128205; Location';
        document.getElementById('c-lc').textContent = lbl;
        closeSheet();
        updateChips();
        render();
      };
    })(items[i]));
  }
  document.getElementById('overlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('sheet-close').onclick = function() { closeSheet(); };
document.getElementById('overlay').addEventListener('click', function(ev) {
  if (ev.target === document.getElementById('overlay')) closeSheet();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(){});
}

window.addEventListener('resize', fit);
fit();
updateChips();
render();

</script>
