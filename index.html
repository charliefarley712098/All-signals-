<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EL Signals">
<title>EL Signals</title>
<style>
:root{
  --bg:#0a0c0f;--panel:#111418;--panel2:#13181f;
  --border:#1e2530;--bb:#2a3545;
  --text:#c8d4e0;--dim:#4a5a6a;--bright:#e8f0f8;
  --acc:#0088cc;--acc2:#00ccaa;--pur:#9B4F96;
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
}
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{color:var(--text);font-family:-apple-system,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;height:100vh}
a,button{text-decoration:none}
button{-webkit-appearance:none;-moz-appearance:none;appearance:none;border:none;background:none;cursor:pointer;font-family:-apple-system,sans-serif}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--panel);border-bottom:2px solid var(--pur);padding-top:var(--sat)}
#hdr-inner{height:48px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;padding:0 14px;gap:10px}
.logo{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;gap:3px;-webkit-flex-shrink:0;flex-shrink:0}
.logo-bar{width:24px;height:5px;background:var(--pur);border-radius:3px}
.logo-dot{width:8px;height:8px;background:#00aa55;border-radius:50%;margin-left:16px;margin-top:-2px}
#hdr-t{-webkit-flex:1;flex:1;min-width:0}
#hdr-t h1{font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--bright);line-height:1}
#hdr-t p{font-size:9px;color:var(--dim);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Courier New',monospace}

/* CONTROLS */
#ctrl{position:fixed;left:0;right:0;z-index:90;background:var(--panel);border-bottom:1px solid var(--border);padding:8px 14px 10px}
#searchbox{
  display:block;width:100%;
  background:#1a2030;
  border:2px solid var(--bb);
  color:var(--bright);
  font-family:'Courier New',monospace;
  font-size:15px;
  padding:10px 14px;
  border-radius:10px;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  margin-bottom:8px;
}
#searchbox:focus{border-color:var(--acc)}
#searchbox::-webkit-input-placeholder{color:var(--dim)}

#chips{display:-webkit-flex;display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
#chips::-webkit-scrollbar{display:none}
.chip{
  -webkit-flex-shrink:0;flex-shrink:0;
  background:transparent;
  border:1px solid var(--bb);
  color:var(--dim);
  font-family:'Courier New',monospace;
  font-size:11px;
  padding:5px 12px;
  border-radius:20px;
  white-space:nowrap;
  text-decoration:none;
}
.chip.on-s1{background:#1a0f2e;border-color:#9B4F96;color:#cc88ff}
.chip.on-s3{background:#0a2535;border-color:#0a4560;color:#44bbee}
.chip.on-s4{background:#0a3520;border-color:#0a5030;color:#44ee88}
.chip.on-dn{background:#0a2535;border-color:#0a4560;color:#44bbee}
.chip.on-up{background:#0a3520;border-color:#0a5030;color:#44ee88}
.chip.on-mn{background:#0f2a0f;border-color:#1a5a1a;color:#55ee55}
.chip.on-pl{background:#2a1800;border-color:#5a3000;color:#ffaa22}
.chip.on-lc{background:#15202f;border-color:var(--acc);color:var(--acc)}

/* SCROLL */
#main{position:fixed;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:var(--sab)}

/* STATS */
#stats{background:#0c0f13;border-bottom:1px solid var(--border);padding:5px 14px;font-family:'Courier New',monospace;font-size:10px;color:var(--dim)}
#stats b{color:var(--acc2)}

/* SECTION HEADER */
.sec-hdr{background:#0c0f13;border-bottom:2px solid var(--pur);padding:7px 14px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px}
.sec-badge{font-family:'Courier New',monospace;font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px}
.sec-badge.s1{background:#1a0f2e;color:#cc88ff;border:1px solid #9B4F96}
.sec-badge.s3{background:#0a2535;color:#44bbee;border:1px solid #0a4560}
.sec-badge.s4{background:#0a3520;color:#44ee88;border:1px solid #0a5030}
.sec-name{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--dim)}

/* LOCATION */
.loc{border-bottom:1px solid var(--border)}
.loc-hdr{background:var(--panel2);padding:10px 14px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.loc-chev{font-size:9px;color:var(--dim);-webkit-flex-shrink:0;flex-shrink:0;width:14px;text-align:center;-webkit-transition:transform .2s;transition:transform .2s}
.loc.closed .loc-chev{-webkit-transform:rotate(-90deg);transform:rotate(-90deg)}
.loc-name{font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--bright);-webkit-flex:1;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-mile{font-family:'Courier New',monospace;font-size:10px;color:var(--acc);white-space:nowrap;-webkit-flex-shrink:0;flex-shrink:0}
.loc-count{font-family:'Courier New',monospace;font-size:10px;color:var(--dim);background:rgba(255,255,255,.04);padding:2px 6px;border-radius:8px;-webkit-flex-shrink:0;flex-shrink:0}
.loc-body{display:block}
.loc.closed .loc-body{display:none}

/* SIGNAL */
.sig{border-bottom:1px solid rgba(30,37,48,.8)}
.sig-hdr{background:#0d1015;padding:8px 14px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sig-id{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:var(--bright)}
.dir-dn{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:10px;text-transform:uppercase;background:#0a2535;color:#44bbee;border:1px solid #0a4560}
.dir-up{font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:10px;text-transform:uppercase;background:#0a3520;color:#44ee88;border:1px solid #0a5030}

/* ROUTE */
.route{padding:8px 14px;border-bottom:1px solid #141a22;display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:flex-start;align-items:flex-start;gap:8px;background:#080b0e}
.route:last-child{border-bottom:none}
.route-left{-webkit-flex:1;flex:1;min-width:0}
.route-line{font-family:'Courier New',monospace;font-size:11px;color:#00cc66;line-height:1.4}
.route-dest{font-family:'Courier New',monospace;font-size:11px;color:#0088cc;margin-top:2px}
.route-dest::before{content:'-> ';color:var(--dim)}
.route-right{display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:flex-end;align-items:flex-end;gap:4px;-webkit-flex-shrink:0;flex-shrink:0}
.asp-m{font-family:'Courier New',monospace;font-size:9px;padding:2px 7px;border-radius:5px;background:#0f2a0f;color:#55ee55;border:1px solid #1a5a1a}
.asp-p{font-family:'Courier New',monospace;font-size:9px;padding:2px 7px;border-radius:5px;background:#2a1800;color:#ffaa22;border:1px solid #5a3000}
.ind{font-family:'Courier New',monospace;font-size:11px;text-align:right}
.i0{color:var(--dim)}.i1{color:#88bbff}.i2{color:#ffdd44;font-weight:700}.i3{color:#ff8844}.i4{color:var(--text)}
mark{background:rgba(0,136,204,.3);color:var(--bright);border-radius:2px;padding:0 1px}

/* EMPTY */
#empty{text-align:center;padding:60px 20px;color:var(--dim);font-family:'Courier New',monospace;display:none}

/* SHEET */
#overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:rgba(0,0,0,.75);display:none;-webkit-align-items:flex-end;align-items:flex-end}
#overlay.open{display:-webkit-flex;display:flex}
#sheet{width:100%;background:var(--panel);border-radius:20px 20px 0 0;border-top:2px solid var(--pur);max-height:75vh;display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;padding-bottom:var(--sab)}
#sheet-handle{width:40px;height:4px;background:var(--bb);border-radius:2px;margin:12px auto 0}
#sheet-title{font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.07em;color:var(--bright);padding:12px 16px 10px;border-bottom:1px solid var(--border);display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center}
#sheet-close{font-size:24px;color:var(--dim);line-height:1;padding:0 4px}
#sheet-list{overflow-y:auto;-webkit-overflow-scrolling:touch;-webkit-flex:1;flex:1}
.sheet-sec{padding:8px 16px 4px;font-family:'Courier New',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;background:var(--bg);border-bottom:1px solid var(--border)}
.sheet-item{padding:13px 16px;border-bottom:1px solid var(--border);display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:center;align-items:center}
.sheet-item.sel .item-name{color:var(--acc)}
.item-name{font-size:15px;color:var(--bright);font-weight:500}
.item-mile{font-family:'Courier New',monospace;font-size:10px;color:var(--dim);margin-top:2px}
.item-tick{color:var(--acc);font-size:18px}

</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-inner">
    <div class="logo"><div class="logo-bar"></div><div class="logo-dot"></div></div>
    <div id="hdr-t">
      <h1>Elizabeth Line &middot; Signals</h1>
      <p>S1 Paddington-Reading &middot; S3 Liverpool St-Shenfield &middot; S4 Heathrow</p>
    </div>
  </div>
</div>

<div id="ctrl">
  <input id="searchbox" type="text" placeholder="Search signal, route, destination..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div id="chips">
    <button class="chip" id="btn-s1" onclick="toggleSec('S1')">S1</button>
    <button class="chip" id="btn-s3" onclick="toggleSec('S3')">S3</button>
    <button class="chip" id="btn-s4" onclick="toggleSec('S4')">S4</button>
    <button class="chip" id="btn-dn" onclick="toggleDir('DN')">&#x2193; Down</button>
    <button class="chip" id="btn-up" onclick="toggleDir('UP')">&#x2191; Up</button>
    <button class="chip" id="btn-mn" onclick="toggleAsp('M')">Main</button>
    <button class="chip" id="btn-pl" onclick="toggleAsp('PL')">PL</button>
    <button class="chip" id="btn-lc" onclick="openSheet()">&#x1F4CD; Location</button>
  </div>
</div>

<div id="main">
  <div id="stats"><b id="n-sigs">-</b> signals &nbsp; <b id="n-routes">-</b> routes &nbsp; <b id="n-locs">-</b> locations</div>
  <div id="content"></div>
  <div id="empty"><p>No signals match</p></div>
</div>

<div id="overlay" onclick="overlayClick(event)">
  <div id="sheet">
    <div id="sheet-handle"></div>
    <div id="sheet-title">
      <span>Select Location</span>
      <button id="sheet-close" onclick="closeSheet()">&#x2715;</button>
    </div>
    <div id="sheet-list"></div>
  </div>
</div>

'M',i:'-----'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN283',d:'DN',r:'Up Relief',t:'SN289',a:'M',i:'Position 4'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN283',d:'DN',r:'Bay Buffer stop',t:'—',a:'M',i:'B (SI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN283',d:'DN',r:'Bay Buffer stop',t:'—',a:'PL',i:'B (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN6195',d:'DN',r:'Up Relief',t:'SN289',a:'PL',i:'-----'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN6195',d:'DN',r:'Platform 5 Bay Stop block',t:'—',a:'PL',i:'-----'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN6195',d:'DN',r:'Siding Stop block',t:'—',a:'PL',i:'-----'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN278',d:'UP',r:'Up Main',t:'SN270',a:'M',i:'Position 1'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN278',d:'UP',r:'Down Main Reversible',t:'SN268',a:'M',i:'-----'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN280',d:'UP',r:'Up Main',t:'SN270',a:'M',i:'-----'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN282',d:'UP',r:'Sidings Stop block',t:'—',a:'PL',i:'S (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN282',d:'UP',r:'Up Goods Loop',t:'SN272',a:'M',i:'G (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN282',d:'UP',r:'Up Goods Loop',t:'SN6194',a:'PL',i:'G (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN282',d:'UP',r:'Up Relief',t:'SN276',a:'M',i:'UR (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN284',d:'UP',r:'Sidings Stop block',t:'—',a:'PL',i:'S (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN284',d:'UP',r:'Up Goods Loop',t:'SN272',a:'M',i:'Position 1'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN284',d:'UP',r:'Up Goods Loop',t:'SN6194',a:'PL',i:'G (MI)'},{x:'S4',l:'Hayes & Harlington',m:'10m 71c',s:'SN284',d:'UP',r:'Up Relief',t:'SN276',a:'M',i:'-----'}];
// ── STATE ──────────────────────────────────────────────────────
var fSec = {};   // active sections: {S1:true, S3:true, S4:true}
var fDir = '';   // 'DN' | 'UP' | ''
var fAsp = '';   // 'M' | 'PL' | ''
var fLoc = '';   // location name or ''
var fLocSec = '';// section of active location
var q = '';      // search string
var closed = {}; // collapsed location keys

var SEC_NAME = {
  S1: 'Section 1 - Paddington to Reading',
  S3: 'Section 3 - Liverpool St to Shenfield',
  S4: 'Section 4 - Heathrow'
};
var SEC_ORDER = ['S1','S3','S4'];

// ── LAYOUT ─────────────────────────────────────────────────────
function fixLayout() {
  var hh = document.getElementById('hdr').offsetHeight;
  var ch = document.getElementById('ctrl').offsetHeight;
  document.getElementById('main').style.top = (hh + ch) + 'px';
}

// ── FILTER ─────────────────────────────────────────────────────
function getFiltered() {
  var out = [];
  var hasSec = Object.keys(fSec).length > 0;
  for (var k = 0; k < D.length; k++) {
    var r = D[k];
    if (hasSec && !fSec[r.x]) continue;
    if (fDir && r.d !== fDir) continue;
    if (fAsp === 'M' && r.a !== 'M') continue;
    if (fAsp === 'PL' && r.a !== 'PL') continue;
    if (fLoc && r.l !== fLoc) continue;
    if (q !== '') {
      var hay = r.x + ' ' + r.l + ' ' + r.s + ' ' + r.r + ' ' + r.t + ' ' + r.i;
      if (hay.toLowerCase().indexOf(q) === -1) continue;
    }
    out.push(r);
  }
  return out;
}

// ── HELPERS ────────────────────────────────────────────────────
function hesc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(txt, term) {
  var safe = hesc(txt);
  if (!term) return safe;
  var re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function indCls(i) {
  if (!i || i === '-----') return 'i0';
  if (i.indexOf('Position') === 0) return 'i1';
  if (i.indexOf('(SI)') !== -1) return 'i2';
  if (i.indexOf('(MI)') !== -1) return 'i3';
  return 'i4';
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  var data = getFiltered();

  // stats
  var sigSet = {};
  for (var k = 0; k < data.length; k++) sigSet[data[k].x + '|' + data[k].s] = 1;
  document.getElementById('n-sigs').textContent = Object.keys(sigSet).length;
  document.getElementById('n-routes').textContent = data.length;

  var ct = document.getElementById('content');
  var empty = document.getElementById('empty');

  if (data.length === 0) {
    ct.innerHTML = '';
    empty.style.display = 'block';
    document.getElementById('n-locs').textContent = 0;
    return;
  }
  empty.style.display = 'none';

  // build tree: sec -> loc -> sig -> [routes]
  var tree = {};
  for (var i = 0; i < SEC_ORDER.length; i++) tree[SEC_ORDER[i]] = {};

  for (var k = 0; k < data.length; k++) {
    var r = data[k];
    if (!tree[r.x][r.l]) tree[r.x][r.l] = {};
    if (!tree[r.x][r.l][r.s]) tree[r.x][r.l][r.s] = [];
    tree[r.x][r.l][r.s].push(r);
  }

  var locCount = 0;
  var html = '';

  for (var si = 0; si < SEC_ORDER.length; si++) {
    var sec = SEC_ORDER[si];
    var locKeys = Object.keys(tree[sec]);
    if (locKeys.length === 0) continue;
    locCount += locKeys.length;

    html += '<div class="sec-hdr">';
    html += '<span class="sec-badge ' + sec.toLowerCase() + '">' + sec + '</span>';
    html += '<span class="sec-name">' + SEC_NAME[sec] + '</span>';
    html += '</div>';

    for (var li = 0; li < locKeys.length; li++) {
      var loc = locKeys[li];
      var sigKeys = Object.keys(tree[sec][loc]);
      var routeCount = 0;
      for (var xi = 0; xi < sigKeys.length; xi++) routeCount += tree[sec][loc][sigKeys[xi]].length;
      var mile = tree[sec][loc][sigKeys[0]][0].m;
      var ck = sec + '|' + loc;
      var isClosed = !!closed[ck];

      var body = '';
      for (var xi = 0; xi < sigKeys.length; xi++) {
        var sig = sigKeys[xi];
        var routes = tree[sec][loc][sig];
        var dir = routes[0].d;
        var dirTag = dir === 'DN'
          ? '<span class="dir-dn">&#x2193; DN</span>'
          : '<span class="dir-up">&#x2191; UP</span>';

        body += '<div class="sig">';
        body += '<div class="sig-hdr"><span class="sig-id">' + highlight(sig, q) + '</span>' + dirTag + '</div>';

        for (var ri = 0; ri < routes.length; ri++) {
          var ro = routes[ri];
          var aspCls = ro.a === 'M' ? 'asp-m' : 'asp-p';
          var aspTxt = ro.a === 'M' ? 'Main' : 'PL';
          body += '<div class="route">';
          body += '<div class="route-left">';
          body += '<div class="route-line">' + highlight(ro.r, q) + '</div>';
          body += '<div class="route-dest">' + highlight(ro.t, q) + '</div>';
          body += '</div>';
          body += '<div class="route-right">';
          body += '<span class="' + aspCls + '">' + aspTxt + '</span>';
          body += '<span class="ind ' + indCls(ro.i) + '">' + highlight(ro.i, q) + '</span>';
          body += '</div>';
          body += '</div>';
        }
        body += '</div>';
      }

      html += '<div class="loc' + (isClosed ? ' closed' : '') + '" id="' + hesc(ck) + '">';
      html += '<div class="loc-hdr" onclick="toggleLoc(\'' + hesc(ck).replace(/'/g,"\\'") + '\')">';
      html += '<span class="loc-chev">&#x25BC;</span>';
      html += '<span class="loc-name">' + highlight(loc, q) + '</span>';
      html += '<span class="loc-mile">' + mile + '</span>';
      html += '<span class="loc-count">' + routeCount + '</span>';
      html += '</div>';
      html += '<div class="loc-body">' + body + '</div>';
      html += '</div>';
    }
  }

  document.getElementById('n-locs').textContent = locCount;
  ct.innerHTML = html;
}

// ── COLLAPSE ───────────────────────────────────────────────────
function toggleLoc(ck) {
  var el = document.getElementById(ck);
  if (!el) return;
  if (el.classList.contains('closed')) {
    el.classList.remove('closed');
    delete closed[ck];
  } else {
    el.classList.add('closed');
    closed[ck] = 1;
  }
}

// ── CHIP TOGGLES ───────────────────────────────────────────────
function toggleSec(s) {
  if (fSec[s]) { delete fSec[s]; } else { fSec[s] = 1; }
  fLoc = ''; fLocSec = '';
  updateChips();
  render();
}

function toggleDir(d) {
  fDir = (fDir === d) ? '' : d;
  updateChips();
  render();
}

function toggleAsp(a) {
  fAsp = (fAsp === a) ? '' : a;
  updateChips();
  render();
}

function updateChips() {
  setChip('btn-s1', !!fSec['S1'], 'on-s1');
  setChip('btn-s3', !!fSec['S3'], 'on-s3');
  setChip('btn-s4', !!fSec['S4'], 'on-s4');
  setChip('btn-dn', fDir === 'DN', 'on-dn');
  setChip('btn-up', fDir === 'UP', 'on-up');
  setChip('btn-mn', fAsp === 'M',  'on-mn');
  setChip('btn-pl', fAsp === 'PL', 'on-pl');
  setChip('btn-lc', !!fLoc,        'on-lc');
}

function setChip(id, on, cls) {
  var el = document.getElementById(id);
  if (!el) return;
  if (on) { el.classList.add(cls); }
  else    { el.classList.remove(cls); }
}

// ── SEARCH ─────────────────────────────────────────────────────
function onSearch() {
  var val = document.getElementById('searchbox').value;
  q = val ? val.trim().toLowerCase() : '';
  render();
}

// Wire up search box every possible way
window.addEventListener('load', function() {
  var sb = document.getElementById('searchbox');
  if (sb) {
    sb.oninput   = onSearch;
    sb.onkeyup   = onSearch;
    sb.onchange  = onSearch;
    sb.onpaste   = function() { setTimeout(onSearch, 10); };
  }
});

// ── LOCATION SHEET ─────────────────────────────────────────────
function openSheet() {
  var activeSecs = Object.keys(fSec).length > 0 ? Object.keys(fSec) : SEC_ORDER.slice();
  var html = '';

  // All locations option
  html += '<div class="sheet-item' + (fLoc ? '' : ' sel') + '" onclick="pickLoc(\'\',\'\')">';
  html += '<div><div class="item-name">All Locations</div></div>';
  if (!fLoc) html += '<span class="item-tick">&#x2713;</span>';
  html += '</div>';

  for (var si = 0; si < activeSecs.length; si++) {
    var sec = activeSecs[si];
    var locs = [];
    var seen = {};
    for (var k = 0; k < D.length; k++) {
      if (D[k].x === sec && !seen[D[k].l]) {
        seen[D[k].l] = 1;
        locs.push(D[k].l);
      }
    }
    if (locs.length === 0) continue;

    html += '<div class="sheet-sec">' + sec + ' &middot; ' + SEC_NAME[sec] + '</div>';

    for (var li = 0; li < locs.length; li++) {
      var loc = locs[li];
      var mile = '';
      for (var k = 0; k < D.length; k++) {
        if (D[k].x === sec && D[k].l === loc) { mile = D[k].m; break; }
      }
      var sel = (fLoc === loc);
      html += '<div class="sheet-item' + (sel ? ' sel' : '') + '" onclick="pickLoc(\'' + hesc(loc).replace(/'/g,"\\'") + '\',\'' + sec + '\')">';
      html += '<div><div class="item-name">' + hesc(loc) + '</div><div class="item-mile">' + mile + '</div></div>';
      if (sel) html += '<span class="item-tick">&#x2713;</span>';
      html += '</div>';
    }
  }

  document.getElementById('sheet-list').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}

function pickLoc(loc, sec) {
  fLoc = loc;
  fLocSec = sec;
  if (loc && sec) { fSec = {}; fSec[sec] = 1; }
  if (!loc) { fSec = {}; }
  var btn = document.getElementById('btn-lc');
  if (btn) btn.textContent = loc ? loc.substring(0, 16) : 'Location';
  closeSheet();
  updateChips();
  render();
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
}

function overlayClick(ev) {
  if (ev.target === document.getElementById('overlay')) closeSheet();
}

// ── INIT ───────────────────────────────────────────────────────
window.addEventListener('resize', fixLayout);
fixLayout();
updateChips();
render();

</script>
